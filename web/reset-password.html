<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vorti — сброс пароля</title>
<style>body{background:#0d1117;color:#e6edf3;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.c{background:#1c2128;padding:32px;border-radius:16px;text-align:center;max-width:360px;width:90%}.code{font-size:20px;font-weight:700;letter-spacing:3px;background:#0d1117;padding:12px;border-radius:8px;color:#58a6ff;word-break:break-all;margin:16px 0;font-family:monospace}a{display:block;background:#238636;color:#fff;text-decoration:none;border-radius:8px;padding:12px;margin:12px 0}hint{color:#8b949e;font-size:13px}</style>
<meta http-equiv="refresh" content="1; url=vortimes://reset-password?token=PLACEHOLDER">
</head>
<body><div class="c"><h2>Сброс пароля</h2><p>Код для восстановления:</p><div class="code" id="code">---</div><a id="link" href="#">Открыть приложение</a><p class="hint">Если приложение не открылось — скопируйте код и введите его в Vorti Messenger.</p></div>
<script>
var t=new URLSearchParams(location.search).get('token')||'';
if(t){
document.getElementById('code').textContent=t;
document.getElementById('link').href='vortimes://reset-password?token='+t;
var m=document.querySelector('meta[http-equiv="refresh"]');
if(m)m.content='1; url=vortimes://reset-password?token='+t;
}
</script>
</body>
</html>

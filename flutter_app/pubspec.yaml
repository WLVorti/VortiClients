name: vorti_messenger
description: "Mobile messenger client for vortiMes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Networking
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  http_parser: ^4.0.2
  
  # File picker
  file_picker: ^8.0.0
  
  # Storage
  shared_preferences: ^2.2.0
  
  # Utils
  uuid: ^4.2.0
  intl: ^0.19.0
  
  # UI
  flutter_secure_storage: ^9.0.0
  video_player: ^2.8.0
  video_thumbnail: ^0.5.3
  just_audio: ^0.9.40
  audio_waveforms: ^1.2.0
  permission_handler: ^11.3.1
  image_cropper: ^8.0.2
  
  # WebRTC
  flutter_webrtc: ^0.12.0
  
  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
